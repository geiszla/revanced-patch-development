name: Release Patches

on:
  push:
    branches: [release]
    paths-ignore:
      - bundle.json
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^version' patches/gradle.properties | cut -d= -f2 | xargs)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from patches/gradle.properties"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building patches version ${VERSION}"

      - name: Fail if tag already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release ${{ steps.version.outputs.tag }} already exists. Bump 'version' in patches/gradle.properties."
            exit 1
          fi

      - name: Build patches
        working-directory: patches
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.REVANCED_PACKAGES_TOKEN }}
        run: ./gradlew build -x test --no-daemon

      - name: Locate .rvp artifact
        id: rvp
        run: |
          RVP=$(ls patches/patches/build/libs/*.rvp 2>/dev/null | head -1)
          if [ -z "$RVP" ]; then
            echo "::error::No .rvp file produced by build"
            exit 1
          fi
          echo "path=${RVP}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${RVP}")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.rvp.outputs.path }}" \
            --repo "${{ github.repository }}" \
            --title "Patches ${{ steps.version.outputs.version }}" \
            --generate-notes
          DL_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.rvp.outputs.name }}"
          echo "download_url=${DL_URL}" >> "$GITHUB_OUTPUT"

      - name: Update bundle.json
        run: |
          cat > bundle.json <<EOF
          {
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "version": "${{ steps.version.outputs.tag }}",
            "download_url": "${{ steps.release.outputs.download_url }}",
            "signature_download_url": "",
            "description": "Automated release of patches ${{ steps.version.outputs.version }}"
          }
          EOF

      - name: Commit bundle.json back to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bundle.json
          if git diff --staged --quiet; then
            echo "bundle.json unchanged"
          else
            git commit -m "chore: update bundle.json for ${{ steps.version.outputs.tag }}"
            git push origin HEAD:release
          fi
